<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="form-section">
      <div class="form-box">
        <h2>Contact Form</h2>
        <p>Please fill the form correctly</p>

        <form id="myForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" />
            <small id="nameError">Name is required</small>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="text" id="email" placeholder="Enter your email" />
            <small id="emailError">Enter a valid email address</small>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="text"
              id="phone"
              placeholder="Enter your phone number"
            />
            <small id="phoneError"
              >Phone number must be at least 10 digits</small
            >
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" />
            <small id="passwordError"
              >Password must be at least 6 characters</small
            >
          </div>

          <button type="submit" class="submit-btn">Submit Form</button>
        </form>
      </div>
    </section>

    <section class="success-section" id="successSection">
      <h2>Form Submitted Successfully!</h2>
      <p>Your form validation is complete.</p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
